<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaLink - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-box { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #00f2fe; font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        
        .tabs { display: flex; margin-bottom: 25px; background: #0f172a; border-radius: 10px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; color: #94a3b8; cursor: pointer; font-weight: 600; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(45deg, #00c6ff, #0072ff); color: #fff; }
        
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; box-sizing: border-box; }
        
        .btn-submit { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, #00c6ff, #0072ff); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-google { background: #db4437; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #c53929; }
        
        .divider { text-align: center; margin: 15px 0; color: #94a3b8; font-size: 12px; display: flex; align-items: center; gap: 10px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #334155; }

        .alert-msg { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 13px; text-align: center; font-weight: bold; }
        .alert-error { background: rgba(255,71,87,0.1); color: #ff4757; border: 1px solid #ff4757; }
        .alert-success { background: rgba(46,213,115,0.1); color: #2ed573; border: 1px solid #2ed573; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-box">
        <div class="logo">
            <h1><i class="fas fa-paper-plane"></i> MetaLink</h1>
        </div>

        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('login')">Login</div>
            <div class="tab-btn" onclick="switchTab('register')">Register</div>
        </div>

        <div id="alertBox" class="alert-msg"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUsernameEmail" placeholder="Email OR Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">Login</button>
            
            <div class="divider">OR</div>
            <button type="button" class="btn-submit btn-google" id="googleLoginBtn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <input type="text" id="regName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Create Username (e.g. prince12)" required pattern="[a-zA-Z0-9_]+" title="Only letters, numbers, and underscores">
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Password (Min 6 chars)" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="regBtn">Create Account</button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('alertBox').style.display = 'none';
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }
    </script>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

</body>
</html>
