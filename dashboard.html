<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - MetaLink VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/links.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ===== EXTRA FIXES FOR SCROLLING ===== */
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        * {
            box-sizing: border-box;
        }
        .main-content {
            overflow-x: hidden;
        }
        .dashboard-container {
            padding: 25px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
        }
        .glass-panel {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            padding: 25px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            overflow-x: hidden;
        }
        .stat-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            width: 100%;
            overflow-x: hidden;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .history-title {
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
        .history-views {
            font-size: 12px;
            color: #00f2fe;
        }
        /* Mobile fix */
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dashboard-container {
                padding: 15px;
            }
            .glass-panel {
                padding: 20px !important;
            }
        }
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR LOADER -->
    <script src="js/sidebar.js"></script>

    <main class="main-content">
        <header class="topbar">
            <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
            <div class="user-profile">
                <span id="userNameDisplay">Loading...</span>
                <div class="user-avatar"><i class="fas fa-crown"></i></div>
            </div>
        </header>

        <div class="dashboard-container">
            
            <!-- LINK SHORTEN BOX -->
            <div class="glass-panel" style="text-align: center;">
                <h2 style="margin-bottom: 25px; font-size: 24px;"><i class="fas fa-bolt" style="color:#00f2fe;"></i> Create Short Link</h2>
                <form id="shortenForm" style="display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto;">
                    <input type="url" id="longUrl" class="form-control" placeholder="Paste your long URL here..." required>
                    <button type="submit" class="btn-submit" id="shortenBtn">Shorten Link <i class="fas fa-arrow-right"></i></button>
                </form>
                <div id="shortenedResult" style="display: none; max-width: 600px; margin: 25px auto 0; padding: 25px; background: rgba(0, 242, 254, 0.05); border: 2px dashed #00f2fe; border-radius: 15px;">
                    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Your VIP Link is Ready!</p>
                    <div id="newShortLink" style="color: #00f2fe; font-weight: bold; font-size: 20px; margin-bottom: 20px; word-wrap: break-word; word-break: break-all;"></div>
                    <button onclick="copyDashboardLink()" id="dashCopyBtn" class="btn-submit" style="background: #2ed573; color: #000; box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4); padding: 15px;">
                        <i class="fas fa-copy"></i> Copy Link
                    </button>
                </div>
            </div>

            <!-- STATS CARDS -->
            <div class="stats-grid">
                <div class="glass-panel stat-card">
                    <div>
                        <h4>Total Views</h4>
                        <h2 id="statViews">0</h2>
                    </div>
                    <div class="icon-box" style="color: #00f2fe;"><i class="fas fa-eye"></i></div>
                </div>
                <div class="glass-panel stat-card">
                    <div>
                        <h4>Total Earnings</h4>
                        <h2 id="statEarnings" style="color: #2ed573;">$0.0000</h2>
                    </div>
                    <div class="icon-box" style="color: #2ed573;"><i class="fas fa-wallet"></i></div>
                </div>
                <div class="glass-panel stat-card">
                    <div>
                        <h4>Current CPM</h4>
                        <h2 id="statCPM" style="color: #ff9f43;">$0.00</h2>
                    </div>
                    <div class="icon-box" style="color: #ff9f43;"><i class="fas fa-fire"></i></div>
                </div>
                <div class="glass-panel stat-card">
                    <div>
                        <h4>Active Links</h4>
                        <h2 id="statLinks">0</h2>
                    </div>
                    <div class="icon-box" style="color: #ffffff;"><i class="fas fa-link"></i></div>
                </div>
            </div>

            <!-- GRAPH + RECENT LINKS -->
            <div class="content-grid">
                <div class="glass-panel" style="height: 350px; padding: 25px;">
                    <h3 style="margin-bottom: 15px; font-size: 16px;"><i class="fas fa-chart-area" style="color:#00f2fe;"></i> Earnings Overview</h3>
                    <canvas id="earningsChart"></canvas>
                </div>
                <div class="glass-panel" style="padding: 25px;">
                    <h3 style="margin-bottom: 15px; font-size: 16px;"><i class="fas fa-history" style="color:#8a2be2;"></i> Recent Links</h3>
                    <ul class="history-list" id="recentLinksList" style="list-style:none; padding:0; margin:0;">
                        <li style="text-align: center; color: #b3b3cc; padding: 20px 0;"><i class="fas fa-spinner fa-spin"></i> Loading...</li>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        /* 1-CLICK COPY */
        function copyDashboardLink() {
            var textToCopy = document.getElementById("newShortLink").innerText;
            var copyBtn = document.getElementById("dashCopyBtn");
            if (!textToCopy) return;
            var tempTextArea = document.createElement("textarea");
            tempTextArea.value = textToCopy;
            tempTextArea.style.position = "absolute";
            tempTextArea.style.left = "-9999px";
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            tempTextArea.setSelectionRange(0, 99999);
            try {
                document.execCommand("copy");
                copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Copied Successfully!';
                copyBtn.style.background = "#ffffff";
                setTimeout(function() {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Link';
                    copyBtn.style.background = "#2ed573";
                }, 2000);
            } catch (err) {
                alert("Browser blocked the copy action.");
            }
            document.body.removeChild(tempTextArea);
        }
    </script>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
